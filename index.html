<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finio — Personal Finance Dashboard</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>

    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <div class="app">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar__logo">
          <div class="sidebar__logo-icon">◆</div>
          <span class="sidebar__logo-text">Finio</span>
        </div>

        <nav class="sidebar__nav">
          <ul class="sidebar__nav-list">
            <li class="sidebar__nav-item">
              <button
                class="sidebar__nav-btn sidebar__nav-btn--active"
                data-page="dashboard"
              >
                <span class="sidebar__nav-icon">⊞</span>
                Dashboard
              </button>
            </li>
            <li class="sidebar__nav-item">
              <button class="sidebar__nav-btn" data-page="transactions">
                <span class="sidebar__nav-icon">⇅</span>
                Transactions
              </button>
            </li>
            <li class="sidebar__nav-item">
              <button class="sidebar__nav-btn" data-page="budget">
                <span class="sidebar__nav-icon">◎</span>
                Budget
              </button>
            </li>
            <li class="sidebar__nav-item">
              <button class="sidebar__nav-btn" data-page="savings">
                <span class="sidebar__nav-icon">◈</span>
                Savings
              </button>
            </li>
            <li class="sidebar__nav-item">
              <button class="sidebar__nav-btn" data-page="settings">
                <span class="sidebar__nav-icon">✦</span>
                Settings
              </button>
            </li>
          </ul>
        </nav>

        <div class="sidebar__user">
          <div class="sidebar__user-avatar">AK</div>
          <div class="sidebar__user-info">
            <span class="sidebar__user-name">Alex Kim</span>
            <span class="sidebar__user-email">alex@finio.app</span>
          </div>
          <button class="sidebar__user-logout" title="Logout">→</button>
        </div>
      </aside>

      <!-- Main -->
      <div class="main">
        <!-- Header -->
        <header class="header">
          <h1 class="header__title" id="page-title">Dashboard</h1>
          <div class="header__actions">
            <div class="header__date">
              <span>📅</span>
              <span id="current-month">Jun 2025</span>
            </div>
            <div class="header__avatar">AK</div>
          </div>
        </header>

        <!-- Pages -->
        <main class="content">
          <section id="dashboard" class="page page--active">
            <!-- ......... -->
          </section>

          <section id="transactions" class="page">
            <!-- ......... -->
          </section>

          <section id="budget" class="page">
            <!-- ......... -->
          </section>

          <section id="savings" class="page">
            <!-- ......... -->
          </section>

          <section id="settings" class="page">
            <!-- ......... -->
          </section>
        </main>
      </div>
    </div>

    <!-- JS -->
    <script src="js/core/storage.js"></script>
    <script src="js/core/state.js"></script>
    <script src="js/core/utils.js"></script>
    <script src="js/services/transactionService.js"></script>
    <script src="js/services/budgetService.js"></script>
    <script src="js/services/savingsService.js"></script>
    <script src="js/components/modal.js"></script>
    <script src="js/components/toast.js"></script>
    <script src="js/pages/dashboard.js"></script>
    <script src="js/pages/transactions.js"></script>
    <script src="js/pages/budget.js"></script>
    <script src="js/pages/savings.js"></script>
    <script src="js/pages/settings.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
