<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finio — Personal Finance Dashboard</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>

    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <div class="app">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar__logo">
          <div class="sidebar__logo-icon">◆</div>
          <span class="sidebar__logo-text">Finio</span>
        </div>

        <nav class="sidebar__nav">
          <ul class="sidebar__nav-list">
            <li class="sidebar__nav-item">
              <button
                class="sidebar__nav-btn sidebar__nav-btn--active"
                data-page="dashboard"
              >
                <span class="sidebar__nav-icon">⊞</span>
                Dashboard
              </button>
            </li>
            <li class="sidebar__nav-item">
              <button class="sidebar__nav-btn" data-page="transactions">
                <span class="sidebar__nav-icon">⇅</span>
                Transactions
              </button>
            </li>
            <li class="sidebar__nav-item">
              <button class="sidebar__nav-btn" data-page="budget">
                <span class="sidebar__nav-icon">◎</span>
                Budget
              </button>
            </li>
            <li class="sidebar__nav-item">
              <button class="sidebar__nav-btn" data-page="savings">
                <span class="sidebar__nav-icon">◈</span>
                Savings
              </button>
            </li>
            <li class="sidebar__nav-item">
              <button class="sidebar__nav-btn" data-page="settings">
                <span class="sidebar__nav-icon">✦</span>
                Settings
              </button>
            </li>
          </ul>
        </nav>

        <div class="sidebar__user">
          <div class="sidebar__user-avatar">AK</div>
          <div class="sidebar__user-info">
            <span class="sidebar__user-name">Alex Kim</span>
            <span class="sidebar__user-email">alex@finio.app</span>
          </div>
          <button class="sidebar__user-logout" title="Logout">→</button>
        </div>
      </aside>

      <!-- Main -->
      <div class="main">
        <!-- Header -->
        <header class="header">
          <h1 class="header__title" id="page-title">Dashboard</h1>
          <div class="header__actions">
            <div class="header__date">
              <span>📅</span>
              <span id="current-month">Jun 2025</span>
            </div>
            <div class="header__avatar">AK</div>
          </div>
        </header>

        <!-- Pages -->
        <main class="content">
          <section id="dashboard" class="page page--active">
            <div class="dashboard">
              <div class="dashboard__stats">
                <div class="stat-card">
                  <div class="stat-card__header">
                    <h3>Total Balance</h3>
                    <i class="fa-solid fa-wallet"></i>
                  </div>
                  <div class="stat-card__amount" id="stat-balance"></div>
                </div>
                <div class="stat-card">
                  <div class="stat-card__header">
                    <h3>Monthly Income</h3>
                    <i class="fa-solid fa-arrow-trend-up"></i>
                  </div>
                  <div class="stat-card__amount" id="stat-income"></div>
                  <div class="stat-card__change" id="stat-income-change"></div>
                </div>
                <div class="stat-card">
                  <div class="stat-card__header">
                    <h3>Monthly Expenses</h3>
                    <i class="fa-solid fa-arrow-trend-down"></i>
                  </div>
                  <div class="stat-card__amount" id="stat-expenses"></div>
                  <div
                    class="stat-card__change"
                    id="stat-expenses-change"
                  ></div>
                </div>
                <div class="stat-card">
                  <div class="stat-card__header">
                    <h3>Net Savings</h3>
                    <i class="fa-solid fa-dollar-sign"></i>
                  </div>
                  <div class="stat-card__amount" id="stat-savings"></div>
                  <div class="stat-card__change" id="stat-savings-change"></div>
                </div>
              </div>

              <div class="dashboard__grid">
                <div class="dashboard__chart-card">
                  <div class="card__header">
                    <h2>Spending by Category</h2>
                  </div>
                  <canvas id="spending-chart"></canvas>
                </div>
                <div class="dashboard__budget-card">
                  <div class="card__header">
                    <h2>Budget Overview</h2>
                  </div>

                  <div id="budget-overview-list"></div>
                </div>
              </div>

              <div class="dashboard__grid">
                <div class="dashboard__savings-card">
                  <div class="card__header">
                    <h2>Savings Goals</h2>
                  </div>
                  <div id="savings-goals-list"></div>
                </div>

                <div class="dashboard__comparison-card">
                  <div class="card__header">
                    <h2>Income vs Expenses</h2>
                  </div>
                  <canvas id="income-expense-chart"></canvas>
                </div>
              </div>
            </div>
          </section>

          <section id="transactions" class="page">
            <div class="transactions">
              <div class="transactions__filters-card">
                <div class="transactions__filters">
                  <div class="transactions__search">
                    <i class="fa-solid fa-search"></i>
                    <input
                      type="text"
                      id="transaction-search"
                      placeholder="Search transaction..."
                    />
                  </div>

                  <div class="transactions__filter-group">
                    <select id="transaction-types-filter">
                      <option value="">Types</option>
                    </select>

                    <select id="transaction-categories-filter">
                      <option value="">Categories</option>
                    </select>

                    <select id="transaction-date-filter">
                      <option value="">Date Range</option>
                    </select>
                  </div>

                  <button id="export-csv-btn" class="btn btn--secondary">
                    <i class="fa-solid fa-file-download"></i>
                    Export CSV
                  </button>

                  <button id="add-transaction-btn" class="btn btn--primary">
                    <i class="fa-solid fa-plus"></i>
                    Add Transaction
                  </button>
                </div>
              </div>

              <div class="transactions__table-card">
                <div class="transactions__table-wrapper">
                  <table class="transactions__table">
                    <thead>
                      <tr>
                        <th>Date</th>
                        <th>Description</th>
                        <th>Category</th>
                        <th>Type</th>
                        <th>Amount</th>
                        <th>Actions</th>
                      </tr>
                    </thead>

                    <tbody id="transactions-list"></tbody>
                  </table>
                </div>
              </div>

              <div class="transactions__pagination-card">
                <div id="transactions-pagination"></div>
              </div>
            </div>
          </section>

          <section id="budget" class="page">
            <!-- ......... -->
          </section>

          <section id="savings" class="page">
            <!-- ......... -->
          </section>

          <section id="settings" class="page">
            <!-- ......... -->
          </section>
        </main>
      </div>
    </div>

    <!-- JS -->
    <script src="js/core/storage.js"></script>
    <script src="js/core/state.js"></script>
    <script src="js/core/utils.js"></script>
    <script src="js/services/transactionService.js"></script>
    <script src="js/services/budgetService.js"></script>
    <script src="js/services/savingsService.js"></script>
    <script src="js/components/modal.js"></script>
    <script src="js/components/toast.js"></script>
    <script src="js/pages/dashboard.js"></script>
    <script src="js/pages/transactions.js"></script>
    <script src="js/pages/budget.js"></script>
    <script src="js/pages/savings.js"></script>
    <script src="js/pages/settings.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
